version: '3.8'

services:
  nebula-waf:
    build: .
    container_name: nebula-shield
    ports:
      - "8080:8080"
    environment:
      - LLM_BACKEND=groq
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OLLAMA_URL=http://ollama:11434
      - LLM_MODEL=
    networks:
      - nebula

  ollama:
    image: ollama/ollama:latest
    container_name: ollama-waf
    ports:
      - "11434:11434"
    networks:
      - nebula

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-waf
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - nebula

networks:
  nebula:
    driver: bridge
